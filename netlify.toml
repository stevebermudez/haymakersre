[build]
  publish = "."

# Serve a real 404 for unknown paths (existing files are served directly and
# shadow this rule). Avoids soft-404s that hurt SEO. Netlify auto-resolves
# pretty URLs (e.g. /about -> /about/index.html) without an explicit rule.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
